 <main class="container-buy">
 <section class="buy-text">
  <h1>Buy a Car</h1>
  </section>
<section>
<form id="order">
  <input type="text" id="name" placeholder="name">

  <select id="car">
    <option>Merseds</option>
    <option>BMW</option>
    <option>GMC</option>
    <option>Ferrari</option>
    <option>Porsche</option>
	<option>Lamborgini</option>
	<option>Toyota</option>
	<option>Nissan</option>
	<option>chevrolet</option>
  </select>

  <select id="color">
    <option>white</option>
    <option>black</option>
    <option>red</option>
  </select>

  <select id="payment">
    <option>cash</option>
    <option>installment</option>
  </select>

  <button type="submit">submit your order</button>
  <p id="Message"></p>
</form>
</section>
</main>
<footer>
  <p>Author: IT TEAM<br>
  <a href="mailto:IT@example.com">IT@example.com</a></p>
</footer>
<script src="themeChange.js"></script>
<script>
  let form = document.getElementById("order");

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    let name = document.getElementById("name").value;
	if(name == ""){
		document.getElementById("Message").innerText = "Name can not be empty";
		return ;
	}
	for(let i=0;i<name.length;i++){
	let char = name[i];
	if(!(char>='a'&& char<='z')&&!(char>='A'&& char<='Z')&&(char!=' ')){
		document.getElementById("Message").innerText = "Name must consist of letters only";
		return;
	}
	 }
    let car = document.getElementById("car").value;
    let message = document.getElementById("Message");
    message.innerText = "Thank you " + name + ", your " + car + " order has been sent!";
	sessionStorage.setItem("lastOrderName", name);
	sessionStorage.setItem("lastOrderCar", car);
  });
</script>
     </body>
